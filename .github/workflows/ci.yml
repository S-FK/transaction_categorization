name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8==7.0.0

      - name: Run flake8
        run: |
          # Collect all Python files outside venv/.git — works even before src/ is committed
          PY_FILES=$(find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./venv/*" \
            -not -path "./.venv/*" \
            2>/dev/null)

          if [ -z "$PY_FILES" ]; then
            echo "No Python files found — skipping lint (src/ not yet committed)"
            exit 0
          fi

          echo "Linting files:"
          echo "$PY_FILES"
          # shellcheck disable=SC2086
          flake8 $PY_FILES \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics
