name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8==7.0.0

      - name: Run flake8
        run: |
          flake8 src/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics
